services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: foodleaf
      POSTGRES_USER: foodleaf
      POSTGRES_PASSWORD: foodleaf
    ports:
      - "5432:5432"
    volumes:
      - foodleaf_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  foodleaf_postgres:
